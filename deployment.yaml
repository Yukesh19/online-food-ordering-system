apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-ordering-deployment
  labels:
    app: food-ordering

spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-ordering

  template:
    metadata:
      labels:
        app: food-ordering

    spec:
      containers:
        - name: food-ordering
          image: yukesh05/online-food-ordering-system:latest   # 🔁 change if needed
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: food-ordering-service

spec:
  type: NodePort
  selector:
    app: food-ordering

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30008   # changed to avoid conflict